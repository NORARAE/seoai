<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    SEOAIco — Constellation favicon
    Gold nodes + thin connecting lines on transparent background.
    Animation: two-node SMIL twinkle (degrades gracefully to static in unsupported browsers).
    Design: 3-node triangle echoing a coverage-map mark.
  -->

  <!-- Connecting lines — drawn under nodes -->
  <line x1="22" y1="5" x2="6" y2="25"  stroke="#c8a84b" stroke-width="1"   stroke-opacity="0.44" stroke-linecap="round"/>
  <line x1="22" y1="5" x2="27" y2="22" stroke="#c8a84b" stroke-width="0.8" stroke-opacity="0.30" stroke-linecap="round"/>
  <line x1="6"  y1="25" x2="27" y2="22" stroke="#c8a84b" stroke-width="0.8" stroke-opacity="0.26" stroke-linecap="round"/>

  <!-- Soft glow halos -->
  <circle cx="22" cy="5"  r="6"   fill="#c8a84b" fill-opacity="0.09"/>
  <circle cx="6"  cy="25" r="4.5" fill="#c8a84b" fill-opacity="0.06"/>

  <!-- Node A — primary star, upper-right, twinkle animation -->
  <circle cx="22" cy="5" r="3.2" fill="#c8a84b">
    <animate attributeName="opacity"
             values="1;0.62;0.94;0.62;1"
             dur="4.2s"
             begin="0s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Node B — secondary, lower-left, static anchor -->
  <circle cx="6" cy="25" r="2.6" fill="#c8a84b" opacity="0.90"/>

  <!-- Node C — tertiary, lower-right, slow offset twinkle -->
  <circle cx="27" cy="22" r="1.9" fill="#c8a84b" opacity="0.60">
    <animate attributeName="opacity"
             values="0.60;0.28;0.60"
             dur="5.8s"
             begin="2.1s"
             repeatCount="indefinite"/>
  </circle>
</svg>
